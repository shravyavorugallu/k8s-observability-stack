prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 50GB
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: fast-ssd
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 100Gi
    additionalScrapeConfigs:
      - job_name: 'cluster-nodes'
        static_configs:
          - targets: ['node01:9100','node02:9100','node03:9100','node04:9100']
      - job_name: 'slurm-exporter'
        static_configs:
          - targets: ['head01:8080']

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: fast-ssd
          resources:
            requests:
              storage: 10Gi
  config:
    global:
      slack_api_url: 'YOUR_SLACK_WEBHOOK'
    route:
      group_by: [alertname, cluster, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack-critical
      routes:
        - match:
            severity: critical
          receiver: slack-critical
        - match:
            severity: warning
          receiver: slack-warning
    receivers:
      - name: slack-critical
        slack_configs:
          - channel: '#infra-alerts-critical'
            title: '[CRITICAL] {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
      - name: slack-warning
        slack_configs:
          - channel: '#infra-alerts'
            title: '[WARNING] {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

grafana:
  adminPassword: changeme   # override with --set grafana.adminPassword=...
  persistence:
    enabled: true
    size: 10Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: cluster
          folder: Cluster
          type: file
          options:
            path: /var/lib/grafana/dashboards/cluster
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
